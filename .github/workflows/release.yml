name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run release validation without publishing
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_PROVENANCE: true
      REGISTRY_STRATEGY: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@^11.5.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check template initialization
        id: template
        run: |
          if node --input-type=module -e "import {findTemplatePlaceholders} from './scripts/template-placeholders.mjs'; const findings = await findTemplatePlaceholders(process.cwd()); process.exit(findings.length > 0 ? 1 : 0);"; then
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          else
            echo "initialized=false" >> "$GITHUB_OUTPUT"
            echo "Template placeholders detected. Release publishing will be skipped."
          fi

      - name: Release preflight dry-run
        if: ${{ steps.template.outputs.initialized == 'true' && github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm -w release:preflight -- --dry-run

      - name: Release preflight
        if: ${{ steps.template.outputs.initialized == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run) }}
        run: pnpm -w release:preflight

      - name: Validate workspace
        run: |
          if [ "${{ steps.template.outputs.initialized }}" = "true" ]; then
            pnpm -w validate
          else
            pnpm -w validate:ci
          fi

      - name: Template release skipped
        if: ${{ steps.template.outputs.initialized != 'true' }}
        run: |
          echo "Release publishing was skipped because this repository still contains template placeholders."
          echo "Run pnpm bootstrap or pnpm init:template in generated repositories before enabling publishing."

      - name: Release dry-run completed
        if: ${{ steps.template.outputs.initialized == 'true' && github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "Release validation completed. Publishing was skipped because dry_run=true."

      - name: Version and publish packages
        if: ${{ steps.template.outputs.initialized == 'true' && (github.event_name != 'workflow_dispatch' || !inputs.dry_run) }}
        uses: changesets/action@v1
        with:
          commit: Version Packages
          title: Version Packages
          version: pnpm -w changeset version
          publish: pnpm -w publish:packages
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
